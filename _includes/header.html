<style>

    text-shadow: 0 0 15px rgba(244, 196, 48, 0.4);

  .logo:hover {

    text-shadow: 0 0 25px rgba(244, 196, 48, 0.8);
  }
  
  .main-nav {

    gap: 35px;
    align-items: center;

    color: var(--text-light);
    text-decoration: none;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    transition: color 0.3s ease, text-shadow 0.3s ease;
  }
  
  .main-nav a:hover {
    color: var(--accent-gold);
    text-shadow: 0 0 10px rgba(244, 196, 48, 0.5);
  }

    font-weight: 800;
    border-radius: 6px;

    box-shadow: 0 0 10px rgba(244, 196, 48, 0.2);
  }
  
  .header-btn:hover {
    background: linear-gradient(135deg, var(--accent-red) 0%, #a01d1d 100%);
    color: #ffffff;
    border-color: var(--accent-red);
    box-shadow: 0 0 20px rgba(211, 47, 47, 0.6);
    transform: translateY(-2px);
  }

  @media (max-width: 850px) {
    .site-header { padding: 15px 0; }
    .header-container { flex-direction: column; gap: 15px; justify-content: center; }
    .main-nav { gap: 20px; flex-wrap: wrap; justify-content: center; }
