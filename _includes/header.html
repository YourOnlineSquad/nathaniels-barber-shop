  .mega-menu {

    width: 600px;
    padding: 30px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    opacity: 0;
    visibility: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
  }

  /* Show Mega Menu on Hover */
  .nav-item:hover .mega-menu {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }

  .mega-link {
    display: flex;
    align-items: center;
    gap: 15px;
    text-decoration: none;
    padding: 15px;
    border-radius: 8px;
    transition: background 0.3s ease;
