<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title | default: "Nathaniel's Barber Shop | Sioux Falls SD" }}</title>
  <meta name="description" content="High-end barber shop in Sioux Falls SD offering precision haircuts, beard trims, and straight razor shaves. By appointment only.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep-space: #020203;
      --bg-panel: rgba(15, 15, 18, 0.72);
      --accent-gold: #f4c430;
      --accent-red: #d32f2f;
      --text-light: #ffffff;
      --text-muted: #a0aab5;
      --border-soft: rgba(255, 255, 255, 0.08);
      --header-height: 90px;
      --max-width: 1200px;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg-deep-space);
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .stars-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 200vh;
      z-index: -1;
      background-image:
        radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 150px 80px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(3px 3px at 300px 250px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 80px 350px, #f4c430, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 450px 100px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(3px 3px at 250px 450px, #ffffff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 400px 400px;
      animation: moveStars 80s linear infinite;
      opacity: 0.95;
      pointer-events: none;
    }

    @keyframes moveStars {
      from { transform: translateY(0); }
      to { transform: translateY(-400px); }
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      line-height: 1.1;
      text-wrap: balance;
    }

    p, li {
      color: var(--text-muted);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    main {
      padding-top: var(--header-height);
      position: relative;
      z-index: 1;
    }

    .container {
      width: min(var(--max-width), 92%);
      margin: 0 auto;
    }

    .section {
      padding: 96px 0;
    }

    .card,
    .service-card,
    .step-card,
    .faq-item,
    .review-box,
    .image-placeholder {
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-soft);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.55);
      border-radius: 16px;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }

    .card:hover,
    .service-card:hover,
    .step-card:hover,
    .faq-item:hover,
    .review-box:hover,
    .image-placeholder:hover {
      border-color: rgba(244, 196, 48, 0.35);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.65);
      transform: translateY(-4px);
    }

    .btn-gold,
    .btn-massive,
    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, rgba(244, 196, 48, 0.14) 0%, rgba(244, 196, 48, 0.24) 100%);
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      padding: 14px 22px;
      border-radius: 8px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: all 0.35s ease;
      backdrop-filter: blur(10px);
    }

    .btn-gold:hover,
    .btn-massive:hover,
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-red) 0%, #a01d1d 100%);
      color: #ffffff;
      border-color: var(--accent-red);
      box-shadow: 0 15px 30px rgba(211, 47, 47, 0.3);
      transform: translateY(-3px);
    }

    svg {
      stroke: var(--accent-gold);
      transition: transform 0.3s ease, filter 0.3s ease;
      filter: drop-shadow(0 0 8px rgba(244, 196, 48, 0.25));
    }

    .card:hover svg,
    .service-card:hover svg {
      transform: scale(1.06);
      filter: drop-shadow(0 0 14px rgba(244, 196, 48, 0.4));
    }

    ::selection {
      background: var(--accent-gold);
      color: #000000;
    }

    @media (max-width: 768px) {
      :root {
        --header-height: 76px;
      }

      .section {
        padding: 72px 0;
      }
    }
  </style>
</head>
<body>

  <div class="stars-container"></div>

  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

</body>
</html>
