 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{{ page.title | default: "Nathaniel’s Barber Shop | Sioux Falls SD" }}</title>
    <meta name="description" content="High-end barber shop in Sioux Falls SD offering precision haircuts, beard trims, and straight razor shaves. By appointment only.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* GLOBAL VARIABLES */
        :root {
            --bg-deep-space: #03050b; 
            --neon-blue: #00e5ff;
            --neon-blue-dim: rgba(0, 229, 255, 0.15);
            --neon-purple: rgba(138, 43, 226, 0.15);
            --accent-gold: #f4c430;
            --text-light: #ffffff;
            --text-muted: #a0aab5;
            --header-height: 90px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-deep-space);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* -------------------------------------------
           MOVING SPACE AMBIENCE & NEON GAS CLOUDS 
           ------------------------------------------- */
        .space-background {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            background: 
                radial-gradient(circle at 20% 40%, var(--neon-blue-dim) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, var(--neon-purple) 0%, transparent 60%);
            filter: blur(40px);
            animation: pulseClouds 10s infinite alternate ease-in-out;
        }

        @keyframes pulseClouds {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* MOVING STARS */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 200vh;
            z-index: -1;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 80px, #e0e0e0, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 300px 250px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 80px 350px, #b3b3b3, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 450px 100px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2.5px 2.5px at 250px 450px, #00e5ff, rgba(0,0,0,0)); /* Blue stars */
            background-repeat: repeat;
            background-size: 500px 500px;
            animation: moveStars 100s linear infinite;
            opacity: 0.6;
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-500px); }
        }

        /* -------------------------------------------
           HIGH-END SAAS ELEMENTS (Floating & Glowing)
           ------------------------------------------- */
        
        /* Floating Glass Cards */
        .card, .service-card, .step-card, .faq-item, .review-box, .image-placeholder {
            background: rgba(10, 15, 25, 0.4) !important; 
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(0, 229, 255, 0.2) !important;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(0, 229, 255, 0.05) !important;
            border-radius: 16px !important;
            position: relative;
            animation: floatUpDown 6s ease-in-out infinite;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        /* Offset the floating animation slightly for different cards so they don't move at the exact same time */
        .card:nth-child(2) { animation-delay: 1s; }
        .card:nth-child(3) { animation-delay: 2s; }

        @keyframes floatUpDown {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        
        /* Hover state for Cards */
        .card:hover, .service-card:hover {
            border-color: var(--neon-blue) !important;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.3), inset 0 0 20px rgba(0, 229, 255, 0.1) !important;
            transform: translateY(-20px) scale(1.02) !important;
            animation-play-state: paused; /* Pause float when interacting */
        }

        /* Glowing Vector SVGs */
        svg {
            filter: drop-shadow(0 0 12px var(--neon-blue)) !important;
            stroke: var(--neon-blue) !important;
            transition: all 0.3s ease;
        }

        .card:hover svg, .service-card:hover svg {
            filter: drop-shadow(0 0 20px var(--neon-blue)) drop-shadow(0 0 40px #fff) !important;
        }

        /* -------------------------------------------
           FLOATING COLOR-CHANGING BUTTONS
           ------------------------------------------- */
        .btn-gold, .btn-massive {
            background: rgba(0, 0, 0, 0.5) !important;
            color: var(--neon-blue) !important;
            border: 1px solid var(--neon-blue) !important;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3), inset 0 0 10px rgba(0, 229, 255, 0.1) !important;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease !important;
            display: inline-block;
        }
        
        .btn-gold:hover, .btn-massive:hover {
            background: var(--neon-blue) !important;
            color: #000 !important; /* Dark text on hover for contrast */
            border-color: #fff !important;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.8), 0 0 60px rgba(0, 229, 255, 0.4) !important;
            transform: translateY(-5px) scale(1.05) !important;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        main { flex: 1; padding-top: var(--header-height); position: relative; z-index: 10; }
        
        ::selection { background: var(--neon-blue); color: #000; }
    </style>
</head>
<body>

    <div class="space-background"></div>
    <div class="stars-container"></div>

    {% include header.html %}

    <main>
        {{ content }}
    </main>

    {% include footer.html %}

</body>
</html>
