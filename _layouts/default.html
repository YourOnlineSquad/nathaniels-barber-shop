<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Nathaniel's Barber Shop | Sioux Falls, SD" }}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

    <style>
      /* --- GLOBAL DESIGN SYSTEM --- */
      :root {
        --bg-dark: #0a0a0a;
        --bg-card: #141414;
        --accent-gold: #d4af37;
        --accent-gold-hover: #f0c550;
        --text-light: #f5f5f5;
        --text-muted: #a3a3a3;
        --border-soft: rgba(212, 175, 55, 0.15);
        
        --font-heading: 'Playfair Display', serif;
        --font-body: 'Inter', sans-serif;
        
        --transition-smooth: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      /* --- BASE RESET --- */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      
      body {
        background-color: var(--bg-dark);
        color: var(--text-light);
        font-family: var(--font-body);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 600; color: var(--text-light); }
      a { text-decoration: none; transition: var(--transition-smooth); }

      /* --- REUSABLE STRUCTURAL CLASSES --- */
      main { flex: 1; } /* Pushes footer to bottom */

      .container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }

      .section { padding: 100px 0; }
      .section-title { text-align: center; color: var(--accent-gold); font-size: 2.5rem; margin-bottom: 3rem; }

      /* --- HEADER & NAVBAR --- */
      .site-header {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: rgba(10, 10, 10, 0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-soft);
        padding: 1rem 0;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-family: var(--font-heading);
        font-size: 1.8rem;
        color: var(--accent-gold);
        letter-spacing: 1px;
        font-weight: 700;
      }

      .nav-menu {
        display: flex;
        list-style: none;
        gap: 2.5rem;
        align-items: center;
        margin: 0;
        padding: 0;
      }

      .nav-menu a {
        color: var(--text-light);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
      }

      .nav-menu a:hover { color: var(--accent-gold); }

      /* --- BUTTONS --- */
      .btn-primary {
        display: inline-block;
        background: var(--accent-gold);
        color: #000 !important;
        padding: 12px 28px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-radius: 4px;
        border: 1px solid var(--accent-gold);
      }

      .btn-primary:hover {
        background: transparent;
        color: var(--accent-gold) !important;
        box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
        transform: translateY(-2px);
      }

      /* --- CARDS & GRIDS --- */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
      }

      .card {
        background-color: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        padding: 3rem 2rem;
        text-align: center;
        transition: var(--transition-smooth);
      }

      .card:hover {
        transform: translateY(-8px);
        border-color: var(--accent-gold);
        box-shadow: 0 12px 30px rgba(212, 175, 55, 0.08);
      }

      .card h3 { font-size: 1.5rem; margin-bottom: 1rem; }
      .card p { color: var(--text-muted); margin-bottom: 1.5rem; }
      
      /* --- MOBILE RESPONSIVENESS --- */
      @media (max-width: 768px) {
        .navbar { flex-direction: column; gap: 1rem; }
        .nav-menu { flex-wrap: wrap; justify-content: center; gap: 1.5rem; }
        .section { padding: 60px 0; }
      }
    </style>
</head>
<body>

    {% include header.html %}

    <main>
        {{ content }}
    </main>

    {% include footer.html %}

</body>
</html>
