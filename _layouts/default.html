<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg-dark: #121212;
      --bg-card: #1e1e1e;
      --accent-gold: #D4AF37;
      --text-light: #f5f5f5;
      --text-muted: #aaa;
      --header-height: 70px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* HEADER */
    .site-header {
      position: fixed;
      top: 0;
      width: 100%;
      height: var(--header-height);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      z-index: 999;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      font-size: 20px;
      color: white;
    }

    .nav-menu ul {
      display: flex;
      gap: 20px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-menu a {
      color: var(--text-muted);
      font-size: 14px;
      transition: 0.3s;
    }

    .nav-menu a:hover {
      color: var(--accent-gold);
    }

    .btn-primary {
      background: var(--accent-gold);
      color: black !important;
      padding: 8px 14px;
      border-radius: 4px;
      font-weight: bold;
    }

    main {
      padding-top: 100px;
    }

    footer {
      text-align: center;
      padding: 40px;
      background: #0a0a0a;
      color: #777;
      margin-top: 60px;
    }
  </style>
</head>

<body>

  {% include header.html %}

  <main>
    {{ content }}
  </main>

  <footer>
    © {{ site.time | date: "%Y" }} Nathaniel’s Barber Shop
  </footer>

</body>
</html>
