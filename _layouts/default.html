 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg-dark: #080808;
      --bg-panel: rgba(18, 18, 18, 0.88);
      --bg-soft: #121212;
      --accent-gold: #d4af37;
      --accent-gold-strong: #f0c550;
      --text-light: #f5f5f5;
      --text-muted: #b3b3b3;
      --border-soft: rgba(255,255,255,0.08);
      --shadow-soft: 0 18px 50px rgba(0,0,0,0.35);
      --shadow-gold: 0 10px 30px rgba(212,175,55,0.18);
      --max-width: 1200px;
      --header-height: 78px;
      --radius-lg: 18px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(212,175,55,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(212,175,55,0.04), transparent 22%),
        linear-gradient(180deg, #060606 0%, #0b0b0b 100%);
      color: var(--text-light);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
      height: auto;
    }

    .container {
      width: min(var(--max-width), 92%);
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 999;
      height: var(--header-height);
      background: rgba(5,5,5,0.82);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .navbar {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .nav-menu ul {
      list-style: none;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 18px;
      margin: 0;
      padding: 0;
    }

    .nav-menu a {
      color: var(--text-muted);
      font-size: 14px;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .nav-menu a:hover {
      color: var(--accent-gold);
      transform: translateY(-1px);
    }

    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-strong) 100%);
      color: #111 !important;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      box-shadow: var(--shadow-gold);
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(212,175,55,0.24);
      opacity: 1;
    }

    main {
      min-height: 70vh;
    }

    .hero {
      padding: 110px 0 88px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.15) 100%);
      pointer-events: none;
    }

    .hero .container {
      position: relative;
      z-index: 1;
    }

    .hero h1 {
      font-size: clamp(42px, 7vw, 76px);
      line-height: 1.02;
      margin: 0 0 18px;
      max-width: 900px;
      letter-spacing: -1px;
    }

    .hero p {
      font-size: 19px;
      color: var(--text-muted);
      max-width: 720px;
      margin: 0 0 28px;
    }

    .section {
      padding: 84px 0;
    }

    .section h2 {
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.08;
      margin: 0 0 18px;
    }

    .section p {
      color: var(--text-muted);
      max-width: 820px;
      font-size: 17px;
      margin: 0 0 18px;
    }

    .eyebrow {
      display: inline-block;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1.6px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 22px;
      margin-top: 28px;
    }

    .card {
      background: linear-gradient(180deg, rgba(23,23,23,0.96) 0%, rgba(14,14,14,0.96) 100%);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: var(--shadow-soft);
      transition: transform 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(212,175,55,0.35);
      box-shadow: 0 22px 56px rgba(0,0,0,0.42);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #fff;
    }

    .card p {
      margin: 0;
      font-size: 15px;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 34px;
      align-items: center;
    }

    .media-placeholder {
      min-height: 360px;
      border-radius: 24px;
      border: 1px solid rgba(212,175,55,0.14);
      background:
        linear-gradient(135deg, rgba(212,175,55,0.10), rgba(255,255,255,0.02)),
        linear-gradient(180deg, #171717 0%, #0f0f0f 100%);
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
    }

    .media-placeholder::before,
    .media-placeholder::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(212,175,55,0.08);
      filter: blur(10px);
      animation: floatOrb 8s ease-in-out infinite;
    }

    .media-placeholder::before {
      width: 180px;
      height: 180px;
      top: 22px;
      left: 18px;
    }

    .media-placeholder::after {
      width: 120px;
      height: 120px;
      right: 24px;
      bottom: 20px;
      animation-delay: 1.5s;
    }

    @keyframes floatOrb {
      0% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-14px) translateX(6px); }
      100% { transform: translateY(0px) translateX(0px); }
    }

    .feature-list {
      display: grid;
      gap: 14px;
      margin-top: 22px;
    }

    .feature-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      color: var(--text-muted);
    }

    .cta-panel {
      background: linear-gradient(180deg, rgba(19,19,19,0.98) 0%, rgba(10,10,10,0.98) 100%);
      border: 1px solid rgba(212,175,55,0.16);
      border-radius: 26px;
      padding: 40px;
      box-shadow: var(--shadow-soft);
    }

    .site-footer {
      margin-top: 70px;
      background: rgba(6,6,6,0.94);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 44px 0;
    }

    .site-footer p,
    .site-footer a {
      color: #8f8f8f;
      margin: 7px 0;
      font-size: 15px;
    }

    .site-footer a:hover {
      color: var(--accent-gold);
    }

    @media (max-width: 980px) {
      .navbar {
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: 12px 0;
        height: auto;
      }

      .site-header {
        height: auto;
      }

      .nav-menu ul {
        gap: 14px;
      }

      .split {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 92px 0 70px;
      }
    }

    @media (max-width: 640px) {
      .nav-menu ul {
        flex-direction: column;
        align-items: flex-start;
      }

      .card-grid {
        grid-template-columns: 1fr;
      }

      .cta-panel {
        padding: 28px;
      }

      .hero h1 {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>

  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

</body>
</html>
