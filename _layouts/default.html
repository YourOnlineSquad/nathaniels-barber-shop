<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{{ page.title | default: "Nathaniel’s Barber Shop | Sioux Falls SD" }}</title>
    <meta name="description" content="High-end barber shop in Sioux Falls SD offering precision haircuts, beard trims, and straight razor shaves. By appointment only.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* Global CSS Variables - Ensures consistency across all pages */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --accent-gold: #D4AF37;
            --text-light: #f5f5f5;
            --text-muted: #a0a0a0;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
            --header-height: 80px;
        }

        /* Modern CSS Reset */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-body);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Typography overrides */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 700;
        }

        /* Layout Structure */
        main {
            flex: 1; /* Pushes the footer to the bottom of the screen on short pages */
            padding-top: var(--header-height); /* Accounts for the sticky header */
        }

        /* Global Utility Classes */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Custom Selection Color */
        ::selection {
            background: var(--accent-gold);
            color: #121212;
        }
    </style>
</head>
<body>

    {% include header.html %}

    <main>
        {{ content }}
    </main>

    {% include footer.html %}

</body>
</html>
