 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{{ page.title | default: "Nathaniel’s Barber Shop | Sioux Falls SD" }}</title>
    <meta name="description" content="High-end barber shop in Sioux Falls SD offering precision haircuts, beard trims, and straight razor shaves. By appointment only.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* GLOBAL VARIABLES - Cleaned up, removed neon, focused on pure space & logo colors */
        :root {
            --bg-deep-space: #020203; /* Near absolute black */
            --accent-gold: #f4c430; /* Logo Gold */
            --accent-red: #d32f2f; /* Logo Red */
            --text-light: #ffffff;
            --text-muted: #a0aab5;
            --header-height: 90px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-deep-space);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* -------------------------------------------
           BRIGHT MOVING STARFIELD (No Gas Clouds)
           ------------------------------------------- */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 200vh;
            z-index: -1;
            /* Using pure white and slight gold for maximum brightness and clarity */
            background-image: 
                radial-gradient(2.5px 2.5px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 80px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 300px 250px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 80px 350px, #f4c430, rgba(0,0,0,0)), /* Subtle gold star */
                radial-gradient(2.5px 2.5px at 450px 100px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(3.5px 3.5px at 250px 450px, #ffffff, rgba(0,0,0,0)); 
            background-repeat: repeat;
            background-size: 400px 400px;
            animation: moveStars 80s linear infinite;
            opacity: 1; /* Full brightness */
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-400px); }
        }

        /* -------------------------------------------
           HIGH-END SAAS ELEMENTS (Floating Glass)
           ------------------------------------------- */
        
        /* Floating Glass Cards */
        .card, .service-card, .step-card, .faq-item, .review-box, .image-placeholder {
            background: rgba(15, 15, 18, 0.6) !important; 
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important; /* Crisp, subtle white border */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8) !important;
            border-radius: 12px !important;
            position: relative;
            animation: floatUpDown 6s ease-in-out infinite;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        /* Offset the floating animation slightly */
        .card:nth-child(2) { animation-delay: 1s; }
        .card:nth-child(3) { animation-delay: 2s; }

        @keyframes floatUpDown {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        /* Hover state for Cards - Subtle Gold instead of Neon Blue */
        .card:hover, .service-card:hover {
            border-color: rgba(244, 196, 48, 0.4) !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(244, 196, 48, 0.05) !important;
            transform: translateY(-15px) scale(1.02) !important;
            animation-play-state: paused; 
        }

        /* High-End Vector SVGs */
        svg {
            filter: drop-shadow(0 0 8px rgba(244, 196, 48, 0.4)) !important;
            stroke: var(--accent-gold) !important;
            transition: all 0.3s ease;
        }

        .card:hover svg, .service-card:hover svg {
            filter: drop-shadow(0 0 15px var(--accent-gold)) !important;
            transform: scale(1.1);
        }

        /* -------------------------------------------
           FLOATING COLOR-CHANGING BUTTONS (Gold/Red)
           ------------------------------------------- */
        .btn-gold, .btn-massive {
            background: linear-gradient(135deg, rgba(244, 196, 48, 0.1) 0%, rgba(244, 196, 48, 0.2) 100%) !important;
            color: var(--accent-gold) !important;
            border: 1px solid var(--accent-gold) !important;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5) !important;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            border-radius: 6px;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease !important;
            display: inline-block;
        }
        
        .btn-gold:hover, .btn-massive:hover {
            background: linear-gradient(135deg, var(--accent-red) 0%, #a01d1d 100%) !important;
            color: #ffffff !important; 
            border-color: var(--accent-red) !important;
            box-shadow: 0 15px 30px rgba(211, 47, 47, 0.4) !important;
            transform: translateY(-5px) scale(1.03) !important;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        main { flex: 1; padding-top: var(--header-height); position: relative; z-index: 10; }
        
        ::selection { background: var(--accent-gold); color: #000; }
    </style>
</head>
<body>

    <div class="stars-container"></div>

    {% include header.html %}

    <main>
        {{ content }}
    </main>

    {% include footer.html %}

</body>
</html>
